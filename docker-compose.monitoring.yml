version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: echo-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - echo-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: echo-logstash
    ports:
      - "5000:5000"
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - echo-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: echo-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - echo-network

  prometheus:
    image: prom/prometheus:latest
    container_name: echo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    networks:
      - echo-network

  grafana:
    image: grafana/grafana:latest
    container_name: echo-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafanadata:/var/lib/grafana
    networks:
      - echo-network

volumes:
  esdata:
  promdata:
  grafanadata:

networks:
  echo-network:
    external: true
